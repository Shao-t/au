<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --space: #03040f;
    --gold: #e8c97a;
    --gold-dim: rgba(232,201,122,0.18);
    --silver: #aec8e8;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--space); font-family:var(--font-mono); user-select:none; -webkit-user-select:none; overscroll-behavior:none; }
  #gl-canvas { position:fixed; inset:0; z-index:0; display:block; touch-action:none; }
  #vignette {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 28%, rgba(3,4,15,0.45) 60%, rgba(2,3,10,0.82) 100%);
  }
  #hud {
    position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
    z-index:20; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;
  }
  #hud-title {
    font-family:var(--font-serif); font-weight:300; font-size:22px; letter-spacing:.32em;
    color:var(--gold); text-shadow:0 0 24px rgba(232,201,122,0.5);
    opacity:0; animation:fadeUp 2.5s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  #hud-sub {
    font-size:8px; letter-spacing:.5em; text-transform:uppercase; color:rgba(174,200,232,0.5);
    opacity:0; animation:fadeUp 2.5s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  #planet-label {
    position:fixed; z-index:25; pointer-events:none; opacity:0; transition:opacity 0.4s;
    font-family:var(--font-serif); font-weight:300; font-size:15px; letter-spacing:.25em;
    color:var(--gold); text-shadow:0 0 12px rgba(232,201,122,0.6); text-transform:uppercase;
  }
  #event-notify {
    position:fixed; top:28px; left:50%; transform:translateX(-50%);
    z-index:30; font-size:8px; letter-spacing:.45em; text-transform:uppercase;
    color:rgba(255,220,120,0); pointer-events:none; white-space:nowrap;
  }
  #event-notify.visible { animation:eventFlash 3.5s ease forwards; }
  #scale-indicator {
    position:fixed; bottom:36px; right:32px; z-index:20;
    font-size:7px; letter-spacing:.35em; text-transform:uppercase;
    color:rgba(174,200,232,0.4); text-align:right; line-height:2.2;
    opacity:0; animation:fadeIn 2s 2s forwards;
  }
  #scale-bar {
    width:80px; height:1px; background:rgba(174,200,232,0.25);
    margin-left:auto; margin-top:4px; position:relative;
  }
  #scale-bar::before, #scale-bar::after {
    content:''; position:absolute; top:-3px; width:1px; height:7px;
    background:rgba(174,200,232,0.4);
  }
  #scale-bar::before { left:0; }
  #scale-bar::after  { right:0; }
  #speed-ctrl {
    position:fixed; top:28px; right:32px; z-index:20;
    display:flex; flex-direction:column; gap:6px; align-items:flex-end;
    opacity:0; animation:fadeIn 2s 2s forwards;
  }
  #speed-label { font-size:7px; letter-spacing:.4em; text-transform:uppercase; color:rgba(174,200,232,0.4); }
  #speed-track {
    width:90px; height:2px; background:rgba(174,200,232,0.12);
    border-radius:2px; position:relative; cursor:pointer; pointer-events:auto;
  }
  #speed-fill { height:100%; width:30%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); border-radius:2px; transition:width 0.1s; }
  #speed-thumb {
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:8px; height:8px; border-radius:50%; background:var(--gold);
    box-shadow:0 0 8px rgba(232,201,122,0.8); cursor:grab; pointer-events:auto; left:30%;
  }
  #info {
    position:fixed; top:28px; left:32px; z-index:20;
    opacity:0; animation:fadeIn 2s 2s forwards;
  }
  #info-name { font-family:var(--font-serif); font-weight:300; font-size:13px; letter-spacing:.35em; text-transform:uppercase; color:var(--silver); line-height:2; }
  #info-detail { font-size:8px; letter-spacing:.22em; color:rgba(174,200,232,0.38); line-height:2; }
  #view-mode {
    position:fixed; top:28px; left:50%; transform:translateX(-50%);
    z-index:20; font-size:7px; letter-spacing:.5em; text-transform:uppercase;
    color:rgba(174,200,232,0.0); transition:color 1.2s; pointer-events:none;
  }
  #view-mode.show { color:rgba(174,200,232,0.5); }
  #align-btn {
    position:fixed; top:72px; right:32px; z-index:20;
    font-family:var(--font-serif); font-weight:300;
    font-size:11px; letter-spacing:.4em; text-transform:uppercase;
    color:rgba(174,200,232,0.85); background:rgba(10,14,30,0.55);
    border:1px solid rgba(174,200,232,0.45);
    padding:9px 20px; cursor:pointer; pointer-events:auto;
    transition:color 0.3s, border-color 0.3s, background 0.3s;
    opacity:0; animation:fadeIn 2s 2s forwards;
  }
  #align-btn:hover { color:var(--gold); border-color:rgba(232,201,122,0.6); background:rgba(20,16,8,0.65); }
  #align-btn.active { color:var(--gold); border-color:var(--gold); background:rgba(232,201,122,0.08); }
  #labels-toggle-btn {
    position:fixed; top:116px; right:32px; z-index:20;
    font-family:var(--font-serif); font-weight:300;
    font-size:11px; letter-spacing:.4em; text-transform:uppercase;
    color:rgba(174,200,232,0.85); background:rgba(10,14,30,0.55);
    border:1px solid rgba(174,200,232,0.45);
    padding:9px 20px; cursor:pointer; pointer-events:auto;
    transition:color 0.3s, border-color 0.3s, background 0.3s;
    opacity:0; animation:fadeIn 2s 2s forwards;
  }
  #labels-toggle-btn:hover { color:var(--gold); border-color:rgba(232,201,122,0.6); background:rgba(20,16,8,0.65); }
  #labels-toggle-btn.active { color:var(--gold); border-color:var(--gold); background:rgba(232,201,122,0.08); }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes eventFlash {
    0%{color:rgba(255,220,120,0)} 8%{color:rgba(255,220,120,0.9)} 70%{color:rgba(255,220,120,0.6)} 100%{color:rgba(255,220,120,0)}
  }
</style>
</head>
<body>
<canvas id="gl-canvas"></canvas>
<button id="align-btn">Align</button>
<button id="labels-toggle-btn">隱藏文字</button>
<div id="labels" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:5;"></div>
<div id="vignette"></div>
<div id="hud">
  <div id="hud-title">Solar Drift</div>
  <div id="hud-sub">拖曳旋轉 · 滾輪縮放至銀河 · 懸停行星</div>
</div>

<div id="event-notify"></div>

  <div id="info-name">Solar System</div>

</div>
<div id="scale-indicator">
  <div id="scale-label">1 AU</div>
  <div id="scale-bar"></div>
</div>
<div id="speed-ctrl">
  <div id="speed-label">Orbit Speed</div>

    <div id="speed-fill"></div>
    <div id="speed-thumb"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TAU   = Math.PI * 2;
const clamp = (v,a,b) => Math.min(b,Math.max(a,v));
const lerp  = (a,b,t) => a+(b-a)*t;

/* ── Renderer ── */
const canvas = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x03040f,1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

/* ── Scene / Camera ── */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010208, 0.0012);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.05, 80000);
camera.position.set(0,42,110);

/* ── Lights ── */
scene.add(new THREE.AmbientLight(0x0a0c22, 0.9));
const sunLight = new THREE.PointLight(0xfff4d6, 3.5, 600);
scene.add(sunLight);
const rimA = new THREE.PointLight(0x3a6faf, 0.5, 300);
rimA.position.set(-180,60,-80); scene.add(rimA);
const rimB = new THREE.PointLight(0x7a5030, 0.3, 250);
rimB.position.set(200,-40,100); scene.add(rimB);

/* ════════════════════════════════════════════
   STAR FIELD (background)
════════════════════════════════════════════ */
(function buildStars() {
  const N = 4000;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  const palette = [[1.0,0.97,0.88],[0.75,0.85,1.0],[1.0,0.80,0.65],[0.88,0.92,1.0]];
  for (let i=0;i<N;i++) {
    const th=Math.random()*TAU, ph=Math.acos(2*Math.random()-1), r=600+Math.random()*400;
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.sin(ph)*Math.sin(th); pos[i*3+2]=r*Math.cos(ph);
    const c=palette[Math.floor(Math.random()*palette.length)], br=0.55+Math.random()*0.45;
    col[i*3]=c[0]*br; col[i*3+1]=c[1]*br; col[i*3+2]=c[2]*br;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({
    size:0.85,vertexColors:true,transparent:true,opacity:0.88,
    depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true
  })));
})();

/* ════════════════════════════════════════════
   SUN
════════════════════════════════════════════ */
const sunGroup = new THREE.Group();
scene.add(sunGroup);
[[0xfff0b0,4.37,1.0,false],[0xffcf60,6.55,0.22,true],[0xff9b22,10.01,0.08,true]].forEach(([c,sz,op,back])=>{
  sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(sz,32,32),new THREE.MeshBasicMaterial({
    color:c,transparent:back,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,side:back?THREE.BackSide:THREE.FrontSide
  })));
});
[13.65,19.11,25.48].forEach((r,i)=>{
  sunGroup.add(new THREE.Mesh(new THREE.SphereGeometry(r,24,24),new THREE.MeshBasicMaterial({
    color:0xff9b22,transparent:true,opacity:0.05-i*0.012,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide
  })));
});

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyWcdZvz6hg2l366xDvl8EGx20wLpTmt6YLhRVq72Yf50FrtsypcgHRRCNShBFmwmva0Q/exec';

const planetMeshes = [];
const labelsContainer = document.getElementById('labels');

// Kepler eccentric anomaly solver (Newton's method) — kept for circular orbits (e=0)
function solveKepler(M, e, iters=8) {
  let E = M;
  for (let i=0;i<iters;i++) E = E - (E - e*Math.sin(E) - M)/(1 - e*Math.cos(E));
  return E;
}

// Returns {x,z} position on the orbital ellipse for mean anomaly M
function orbitalPos(pd, M) {
  const E = solveKepler(M, pd.e);
  const cosE = Math.cos(E), sinE = Math.sin(E);
  const xOrb = pd.a*(cosE - pd.e);
  const zOrb = pd.a*Math.sqrt(1-pd.e*pd.e)*sinE;
  const cosO=Math.cos(pd.Ω), sinO=Math.sin(pd.Ω);
  const cosI=Math.cos(pd.inc), sinI=Math.sin(pd.inc);
  const x =  cosO*xOrb - sinO*cosI*zOrb;
  const y =  sinI*zOrb;
  const z =  sinO*xOrb + cosO*cosI*zOrb;
  return { x, y, z };
}

function keplerSpeedFactor(pd, M) {
  const E = solveKepler(M, pd.e);
  const r = pd.a*(1 - pd.e*Math.cos(E));
  return (pd.a*pd.a) / (r*r);
}

function buildPlanet(pd) {
  /* Circular orbit trace */
  const orbitPts=[];
  const SEGS=256;
  for (let i=0;i<=SEGS;i++) {
    const M=(i/SEGS)*TAU;
    const p=orbitalPos(pd,M);
    orbitPts.push(new THREE.Vector3(p.x,p.y,p.z));
  }
  const orbitLine=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(orbitPts),
    new THREE.LineBasicMaterial({color:0xaec8e8,transparent:true,opacity:0.10,depthWrite:false})
  );
  scene.add(orbitLine);

  /* Planet group */
  const group=new THREE.Group();
  scene.add(group);

  const pMat=new THREE.MeshStandardMaterial({color:pd.color,emissive:pd.emissive,emissiveIntensity:0.35,roughness:0.7,metalness:0.08});
  const pMesh=new THREE.Mesh(new THREE.SphereGeometry(pd.size,32,24),pMat);
  pMesh.rotation.z=pd.tilt;
  group.add(pMesh);

  /* Atmospheric haze */
  const hazeMesh=new THREE.Mesh(
    new THREE.SphereGeometry(pd.size*1.22,24,18),
    new THREE.MeshBasicMaterial({color:pd.color,transparent:true,opacity:0.07,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})
  );
  group.add(hazeMesh);

  /* Persistent name label */
  const label=document.createElement('div');
  label.textContent=pd.name;
  label.style.cssText='position:absolute;transform:translate(-50%,8px);color:#dce6f5;font:300 12px/1.4 "Cormorant Garamond",Georgia,serif;letter-spacing:.15em;text-shadow:0 0 6px #000,0 0 12px #000;white-space:nowrap;';
  labelsContainer.appendChild(label);

  planetMeshes.push({ group, pMesh, hazeMesh, label, data:pd, M:Math.random()*TAU });
}

// 市值 → 行星半徑（對數縮放）
function marketCapToSize(cap, minCap, maxCap) {
  const MIN_SIZE=0.35, MAX_SIZE=4.2;
  if (maxCap===minCap) return (MIN_SIZE+MAX_SIZE)/2;
  const t=(Math.log(cap)-Math.log(minCap))/(Math.log(maxCap)-Math.log(minCap));
  return MIN_SIZE + t*(MAX_SIZE-MIN_SIZE);
}

async function loadMarketCapPlanets() {
  let data;
  try {
    const res = await fetch(GAS_URL);
    data = await res.json();
  } catch (err) {
    console.error('市值資料抓取失敗', err);
    return;
  }
  data.sort((a,b)=>a.rank-b.rank);
  const caps = data.map(d=>d.marketCap);
  const minCap = Math.min(...caps), maxCap = Math.max(...caps);

  data.forEach((d,i)=>{
    const a = 31 + i*((196-31)/(data.length-1));
    const color = new THREE.Color().setHSL(i/data.length, 0.6, 0.55);
    const pd = {
      name: `${d.name} (${d.symbol})`,
      symbol: d.symbol,
      a, e:0, inc:0, Ω:0,
      size: marketCapToSize(d.marketCap, minCap, maxCap),
      color: color.getHex(),
      emissive: color.clone().multiplyScalar(0.15).getHex(),
      speed: Math.pow(18/a, 1.5),
      tilt: Math.random()*0.4,
      marketCap: d.marketCap
    };
    buildPlanet(pd);
  });
}
loadMarketCapPlanets();

/* ════════════════════════════════════════════
   ASTEROID BELT
════════════════════════════════════════════ */
(function(){
  const N=1400; const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){const a=Math.random()*TAU,r=54+Math.random()*9,h=(Math.random()-0.5)*0.9;pos[i*3]=Math.cos(a)*r;pos[i*3+1]=h;pos[i*3+2]=Math.sin(a)*r;}
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x8a7a5a,size:0.22,transparent:true,opacity:0.55,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true})));
})();

/* ════════════════════════════════════════════
   MILKY WAY GALAXY
   Scale: scene units. 1 scene unit ≈ 1 AU in solar system view.
   Galaxy radius ≈ 50,000 ly → we use 18,000 scene units for galaxy radius.
   Sun is ~26,000 ly from center → ~9,000 units.
════════════════════════════════════════════ */
const GALAXY_SCALE = 18000;
const SUN_GALACTIC_R = 9000; // sun distance from galactic center
const SUN_GALACTIC_THETA = 1.2; // angle in galaxy

const galaxyGroup = new THREE.Group();
galaxyGroup.rotation.x = 0.3; // tilt galaxy relative to ecliptic
scene.add(galaxyGroup);

// Sun position marker in galaxy coords
const sunGalacticX = Math.cos(SUN_GALACTIC_THETA)*SUN_GALACTIC_R;
const sunGalacticZ = Math.sin(SUN_GALACTIC_THETA)*SUN_GALACTIC_R;

// Offset so galaxy center is displaced from solar system origin
galaxyGroup.position.set(-sunGalacticX, 0, -sunGalacticZ);

/* Galaxy particle layers */
function galaxyDensity(r, theta, armCount, armOffset) {
  // Spiral arm density function
  const rNorm = r / GALAXY_SCALE;
  // Bulge component
  const bulge = Math.exp(-rNorm * 8);
  // Disk component
  const disk = Math.exp(-rNorm * 1.8) * (1-Math.exp(-rNorm*12));
  // Arm component
  let armDensity = 0;
  for (let k=0;k<armCount;k++) {
    const armTheta = theta - (k/armCount)*TAU - rNorm*12 - armOffset;
    const dTheta = ((armTheta % TAU) + TAU) % TAU;
    const d = Math.min(dTheta, TAU-dTheta);
    armDensity += Math.exp(-d*d*4) * Math.exp(-rNorm*0.8);
  }
  return { bulge, disk, arm: armDensity };
}

// Build galaxy particles
(function buildGalaxy() {
  // Layer 1: Bulge (dense yellow-orange core)
  const bulgeN = 18000;
  const bPos = new Float32Array(bulgeN*3);
  const bCol = new Float32Array(bulgeN*3);
  for (let i=0;i<bulgeN;i++) {
    const r = Math.pow(Math.random(),2.5) * GALAXY_SCALE*0.12;
    const th = Math.random()*TAU;
    const ph = Math.acos(2*Math.random()-1);
    const flattenY = 0.18 + Math.pow(r/(GALAXY_SCALE*0.12),1.5)*0.6;
    bPos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    bPos[i*3+1] = r*Math.sin(ph)*Math.sin(th)*flattenY;
    bPos[i*3+2] = r*Math.cos(ph);
    // Core color: hot white → yellow → orange
    const t = r/(GALAXY_SCALE*0.12);
    bCol[i*3]   = lerp(1.0,0.95,t);
    bCol[i*3+1] = lerp(0.95,0.75,t);
    bCol[i*3+2] = lerp(0.80,0.30,t);
  }
  const bGeo = new THREE.BufferGeometry();
  bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
  bGeo.setAttribute('color',new THREE.BufferAttribute(bCol,3));
  const bulgeMesh = new THREE.Points(bGeo, new THREE.PointsMaterial({
    size:55, vertexColors:true, transparent:true, opacity:0.0,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  }));
  bulgeMesh.name='galaxy-bulge';
  galaxyGroup.add(bulgeMesh);

  // Layer 2: Disk + spiral arms
  const diskN = 55000;
  const dPos = new Float32Array(diskN*3);
  const dCol = new Float32Array(diskN*3);
  // 4 main arms: Norma, Scutum-Centaurus, Sagittarius, Perseus (+ Orion spur)
  const ARM_OFFSETS = [0, Math.PI/2, Math.PI, 3*Math.PI/2];

  for (let i=0;i<diskN;i++) {
    const rFrac = Math.pow(Math.random(), 0.6);
    const r = rFrac * GALAXY_SCALE;
    const baseTh = Math.random()*TAU;

    // Arm winding angle increases with r
    const armIdx = Math.floor(Math.random()*4);
    const armPitch = baseTh + ARM_OFFSETS[armIdx] + rFrac*14;
    // Scatter around arm
    const scatter = (Math.random()-0.5)*(GALAXY_SCALE*0.06*(1+rFrac));
    const finalTh = armPitch + scatter/r;

    const x = Math.cos(finalTh)*r;
    const z = Math.sin(finalTh)*r;
    // Vertical thickness increases with r
    const y = (Math.random()-0.5)*GALAXY_SCALE*0.018*(0.3+rFrac);

    dPos[i*3]=x; dPos[i*3+1]=y; dPos[i*3+2]=z;

    // Color: inner=yellow-white, mid=white-blue, outer=blue-dimmer
    // Young blue stars in arms, older yellow in inter-arm
    const armScatterFrac = Math.abs(scatter)/(GALAXY_SCALE*0.06);
    const inArm = clamp(1-armScatterFrac*2,0,1);
    // Arm stars: blue-white; inter-arm: yellow
    const blue = inArm * clamp(rFrac*1.5,0,1);
    const br = 0.3 + Math.random()*0.7;
    dCol[i*3]   = lerp(0.9,0.6,blue)*br;
    dCol[i*3+1] = lerp(0.85,0.7,blue)*br;
    dCol[i*3+2] = lerp(0.6,1.0,blue)*br;
  }
  const dGeo = new THREE.BufferGeometry();
  dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
  dGeo.setAttribute('color',new THREE.BufferAttribute(dCol,3));
  const diskMesh = new THREE.Points(dGeo, new THREE.PointsMaterial({
    size:38, vertexColors:true, transparent:true, opacity:0.0,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  }));
  diskMesh.name='galaxy-disk';
  galaxyGroup.add(diskMesh);

  // Layer 3: Dust lanes (dark reddish overlay, slightly offset)
  const dustN = 8000;
  const dustPos = new Float32Array(dustN*3);
  const dustCol = new Float32Array(dustN*3);
  for (let i=0;i<dustN;i++) {
    const rFrac = 0.05 + Math.pow(Math.random(),0.7)*0.55;
    const r = rFrac*GALAXY_SCALE;
    const armIdx = Math.floor(Math.random()*4);
    const th = Math.random()*TAU + ARM_OFFSETS[armIdx] + rFrac*14 + 0.15;
    const sc = (Math.random()-0.5)*(GALAXY_SCALE*0.03);
    const finalTh = th + sc/r;
    dustPos[i*3]=Math.cos(finalTh)*r;
    dustPos[i*3+1]=(Math.random()-0.5)*GALAXY_SCALE*0.008;
    dustPos[i*3+2]=Math.sin(finalTh)*r;
    const br=0.08+Math.random()*0.12;
    dustCol[i*3]=br*0.6; dustCol[i*3+1]=br*0.35; dustCol[i*3+2]=br*0.15;
  }
  const dustGeo=new THREE.BufferGeometry();
  dustGeo.setAttribute('position',new THREE.BufferAttribute(dustPos,3));
  dustGeo.setAttribute('color',new THREE.BufferAttribute(dustCol,3));
  const dustMesh=new THREE.Points(dustGeo,new THREE.PointsMaterial({
    size:60,vertexColors:true,transparent:true,opacity:0.0,
    depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true
  }));
  dustMesh.name='galaxy-dust';
  galaxyGroup.add(dustMesh);

  // Layer 4: Bright nebula clusters (H-II regions, pinkish-red)
  const nebN = 3000;
  const nebPos = new Float32Array(nebN*3);
  const nebCol = new Float32Array(nebN*3);
  for (let i=0;i<nebN;i++) {
    const rFrac = 0.08+Math.pow(Math.random(),0.5)*0.65;
    const r=rFrac*GALAXY_SCALE;
    const armIdx=Math.floor(Math.random()*4);
    const th=Math.random()*TAU+ARM_OFFSETS[armIdx]+rFrac*14;
    const sc=(Math.random()-0.5)*(GALAXY_SCALE*0.025);
    const fTh=th+sc/r;
    nebPos[i*3]=Math.cos(fTh)*r;
    nebPos[i*3+1]=(Math.random()-0.5)*GALAXY_SCALE*0.01;
    nebPos[i*3+2]=Math.sin(fTh)*r;
    const br=0.5+Math.random()*0.5;
    nebCol[i*3]=br; nebCol[i*3+1]=br*0.25; nebCol[i*3+2]=br*0.35;
  }
  const nebGeo=new THREE.BufferGeometry();
  nebGeo.setAttribute('position',new THREE.BufferAttribute(nebPos,3));
  nebGeo.setAttribute('color',new THREE.BufferAttribute(nebCol,3));
  const nebMesh=new THREE.Points(nebGeo,new THREE.PointsMaterial({
    size:45,vertexColors:true,transparent:true,opacity:0.0,
    depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true
  }));

})();

   SHOOTING STARS
════════════════════════════════════════════ */
const shootingStars=[];
const MAX_SHOOTING=6;

function spawnShootingStar(isShower) {
  isShower=isShower||false;
  const theta=Math.random()*TAU, dist=180+Math.random()*100;
  const startX=Math.cos(theta)*dist, startY=20+Math.random()*60, startZ=Math.sin(theta)*dist;
  const speed=300+Math.random()*350;
  const dirTheta=theta+Math.PI+(Math.random()-0.5)*0.7;
  const vx=Math.cos(dirTheta)*speed, vy=-(0.25+Math.random()*0.35)*speed, vz=Math.sin(dirTheta)*speed;
  const trailLen=isShower?28:18;
  const positions=new Float32Array(trailLen*3);
  for(let i=0;i<trailLen;i++){positions[i*3]=startX;positions[i*3+1]=startY;positions[i*3+2]=startZ;}
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  const line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:isShower?0xaad4ff:0xeef4ff,transparent:true,opacity:isShower?0.65:0.85,blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(line);
  const coreGeo=new THREE.BufferGeometry();
  coreGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([startX,startY,startZ]),3));
  const corePt=new THREE.Points(coreGeo,new THREE.PointsMaterial({color:0xffffff,size:isShower?2.5:4.0,transparent:true,opacity:1.0,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  scene.add(corePt);
  shootingStars.push({line,corePt,geo,coreGeo,x:startX,y:startY,z:startZ,vx,vy,vz,life:0,maxLife:(trailLen*0.5+Math.random()*15)/(speed/60),trailLen,isShower,history:[[startX,startY,startZ]]});
}

function updateShootingStars(dt) {
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i]; s.life+=dt;
    s.x+=s.vx*dt; s.y+=s.vy*dt; s.z+=s.vz*dt;
    s.history.unshift([s.x,s.y,s.z]);
    if(s.history.length>s.trailLen)s.history.length=s.trailLen;
    const p=s.geo.attributes.position.array;
    for(let j=0;j<s.trailLen;j++){const h=s.history[j]||s.history[s.history.length-1];p[j*3]=h[0];p[j*3+1]=h[1];p[j*3+2]=h[2];}
    s.geo.attributes.position.needsUpdate=true;
    const cp=s.coreGeo.attributes.position.array; cp[0]=s.x;cp[1]=s.y;cp[2]=s.z;
    s.coreGeo.attributes.position.needsUpdate=true;
    const t=s.life/s.maxLife;
    s.line.material.opacity=(1-t*t)*(s.isShower?0.65:0.85);
    s.corePt.material.opacity=1-t;
    if(s.life>s.maxLife){scene.remove(s.line);scene.remove(s.corePt);s.line.geometry.dispose();s.corePt.geometry.dispose();shootingStars.splice(i,1);}
  }
}

/* ════════════════════════════════════════════
   METEORS + IMPACT
════════════════════════════════════════════ */
const meteors=[];
const flashAnimations=[];

function spawnMeteor() {
  const theta=Math.random()*TAU, r=150+Math.random()*80;
  const startPos=new THREE.Vector3(Math.cos(theta)*r,40+Math.random()*50,Math.sin(theta)*r);
  const targetR=15+Math.random()*100, targetTheta=Math.random()*TAU;
  const target=new THREE.Vector3(Math.cos(targetTheta)*targetR,(Math.random()-0.5)*8,Math.sin(targetTheta)*targetR);
  const speed=120+Math.random()*160;
  const vel=target.clone().sub(startPos).normalize().multiplyScalar(speed);
  const totalDist=startPos.distanceTo(target);
  const body=new THREE.Mesh(new THREE.SphereGeometry(0.55+Math.random()*0.55,10,8),new THREE.MeshBasicMaterial({color:0xffa050,blending:THREE.AdditiveBlending,transparent:true,opacity:1.0,depthWrite:false}));
  body.position.copy(startPos);
  body.add(new THREE.Mesh(new THREE.SphereGeometry(2.2+Math.random()*1.0,10,8),new THREE.MeshBasicMaterial({color:0xff6620,blending:THREE.AdditiveBlending,transparent:true,opacity:0.35,depthWrite:false,side:THREE.BackSide})));
  scene.add(body);
  const trailN=40; const trailPos=new Float32Array(trailN*3);
  for(let i=0;i<trailN;i++){trailPos[i*3]=startPos.x;trailPos[i*3+1]=startPos.y;trailPos[i*3+2]=startPos.z;}
  const trailGeo=new THREE.BufferGeometry(); trailGeo.setAttribute('position',new THREE.BufferAttribute(trailPos,3));
  const trail=new THREE.Points(trailGeo,new THREE.PointsMaterial({color:0xff8030,size:1.2,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  scene.add(trail);
  meteors.push({body,trail,trailGeo,pos:startPos.clone(),vel,life:0,maxLife:totalDist/speed,history:[],trailN});
}

function createImpactFlash(pos) {
  const flash=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,6),new THREE.MeshBasicMaterial({color:0xffffff,blending:THREE.AdditiveBlending,transparent:true,opacity:1.0,depthWrite:false}));
  flash.position.copy(pos); scene.add(flash);
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.05,0.3,32),new THREE.MeshBasicMaterial({color:0xff9040,blending:THREE.AdditiveBlending,transparent:true,opacity:0.7,side:THREE.DoubleSide,depthWrite:false}));
  ring.position.copy(pos); ring.lookAt(camera.position); scene.add(ring);
  const debrisN=16; const dPos=new Float32Array(debrisN*3);
  for(let i=0;i<debrisN;i++){dPos[i*3]=pos.x;dPos[i*3+1]=pos.y;dPos[i*3+2]=pos.z;}
  const dGeo=new THREE.BufferGeometry(); dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
  const dMesh=new THREE.Points(dGeo,new THREE.PointsMaterial({color:0xffaa40,size:1.8,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true}));
  scene.add(dMesh);
  const dVels=Array.from({length:debrisN},()=>new THREE.Vector3((Math.random()-.5)*50,(Math.random()-.5)*50,(Math.random()-.5)*50));
  let ft=0;
  flashAnimations.push(function(dt2){
    ft+=dt2; const p=Math.min(ft/1.5,1),e=1-p*p;
    flash.scale.setScalar(1+p*20); flash.material.opacity=e*0.9;
    ring.scale.setScalar(1+p*30); ring.material.opacity=e*0.7; ring.lookAt(camera.position);
    const da=dGeo.attributes.position.array;
    for(let i=0;i<debrisN;i++){da[i*3]=pos.x+dVels[i].x*ft;da[i*3+1]=pos.y+dVels[i].y*ft;da[i*3+2]=pos.z+dVels[i].z*ft;}
    dGeo.attributes.position.needsUpdate=true; dMesh.material.opacity=e*0.9;
    if(ft<1.5)return false;
    scene.remove(flash);scene.remove(ring);scene.remove(dMesh);
    flash.geometry.dispose();ring.geometry.dispose();dGeo.dispose();
    return true;
  });
}

function updateMeteors(dt) {
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i]; m.life+=dt;
    m.pos.addScaledVector(m.vel,dt); m.body.position.copy(m.pos);
    m.history.unshift([m.pos.x,m.pos.y,m.pos.z]);
    if(m.history.length>m.trailN)m.history.length=m.trailN;
    const tp=m.trailGeo.attributes.position.array;
    for(let j=0;j<m.trailN;j++){const h=m.history[j]||m.history[m.history.length-1];tp[j*3]=h[0];tp[j*3+1]=h[1];tp[j*3+2]=h[2];}
    m.trailGeo.attributes.position.needsUpdate=true;
    m.body.material.opacity=clamp(1-(m.life/m.maxLife-0.8)/0.2,0,1);
    if(m.life>=m.maxLife){createImpactFlash(m.pos.clone());scene.remove(m.body);scene.remove(m.trail);m.body.geometry.dispose();m.trailGeo.dispose();meteors.splice(i,1);}
  }
}

function tickEvents(el,dt){
  // Only spawn events when in solar system view
  if(viewMode==='galaxy')return;
  if(el>nextShootingTime&&shootingStars.length<MAX_SHOOTING){spawnShootingStar(false);nextShootingTime=el+4+Math.random()*8;}
  if(el>nextMeteorTime&&meteors.length<3){spawnMeteor();showEvent('⚡ 隕石進入系統');nextMeteorTime=el+10+Math.random()*15;}
  if(!showerActive&&el>nextShowerTime){showerActive=true;showerDuration=8+Math.random()*6;showerTimer=0;showerSpawnInterval=0;showEvent('✦ 流星雨開始');nextShowerTime=el+30+Math.random()*40;}
  if(showerActive){showerTimer+=dt;showerSpawnInterval+=dt;if(showerSpawnInterval>0.18+Math.random()*0.12){spawnShootingStar(true);showerSpawnInterval=0;}if(showerTimer>showerDuration){showerActive=false;showEvent('流星雨結束');}}
  for(let i=flashAnimations.length-1;i>=0;i--){if(flashAnimations[i](dt))flashAnimations.splice(i,1);}
}

let isDragging=false, dragStart={x:0,y:0};
let orbitTheta=0.22, orbitPhi=0.38, orbitDist=125;
let orbitThetaV=0, orbitPhiV=0;
const cameraPos=new THREE.Vector3(), lookPt=new THREE.Vector3(0,0,0);

document.addEventListener('mousedown',e=>{if(e.target.closest&&e.target.closest('#speed-ctrl'))return;isDragging=true;dragStart={x:e.clientX,y:e.clientY};orbitThetaV=0;orbitPhiV=0;});
document.addEventListener('mouseup',()=>{isDragging=false;});
document.addEventListener('mousemove',e=>{if(!isDragging)return;const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;orbitThetaV=dx*0.007;orbitPhiV=dy*0.005;orbitTheta+=orbitThetaV;orbitPhi=clamp(orbitPhi+orbitPhiV,-1.3,1.3);dragStart={x:e.clientX,y:e.clientY};});
document.addEventListener('wheel',e=>{orbitDist=clamp(orbitDist+e.deltaY*0.15,18,12000);},{passive:true});
let touchLast=null, pinchLast=null;
const UI_SELECTOR = '#speed-ctrl, #align-btn, #labels-toggle-btn, #speed-track, #speed-thumb';

document.addEventListener('touchstart',e=>{
  if(e.target.closest(UI_SELECTOR)) return; // UI元件不攔截
  e.preventDefault();
  if(e.touches.length===1){
    touchLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
    pinchLast=null;
    // tap-to-hover：更新 mouseNDC 並觸發 checkHover
    mouseNDC.set((e.touches[0].clientX/innerWidth)*2-1,-(e.touches[0].clientY/innerHeight)*2+1);
    checkHover();
  } else if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchLast=Math.sqrt(dx*dx+dy*dy);
    touchLast=null;
  }
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(e.target.closest(UI_SELECTOR)) return;
  e.preventDefault();
  if(e.touches.length===1&&touchLast){
    const dx=e.touches[0].clientX-touchLast.x,dy=e.touches[0].clientY-touchLast.y;
    orbitTheta+=dx*0.007;orbitPhi=clamp(orbitPhi+dy*0.005,-1.3,1.3);
    touchLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
  } else if(e.touches.length===2&&pinchLast!==null){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    orbitDist=clamp(orbitDist-(dist-pinchLast)*0.8,18,12000);
    pinchLast=dist;
  }
},{passive:false});
document.addEventListener('touchend',()=>{touchLast=null;pinchLast=null;},{passive:true});

/* ════════════════════════════════════════════
   VIEW MODE & ZOOM THRESHOLDS
════════════════════════════════════════════ */
// orbitDist:  <250 = solar system, 250–1500 = transition, >1500 = galaxy
let viewMode='solar'; // 'solar' | 'transition' | 'galaxy'
let galaxyOpacity=0;
let solarOpacity=1;
const viewModeEl=document.getElementById('view-mode');
const scaleLabelEl=document.getElementById('scale-label');
let lastViewMode='';

function updateViewMode() {
  const d=orbitDist;
  if(d<280){viewMode='solar';}
  else if(d<1800){viewMode='transition';}
  else{viewMode='galaxy';}

  // Galaxy layer opacities
  if(viewMode==='solar'){
    galaxyOpacity=lerp(galaxyOpacity,0,0.05);
    solarOpacity=lerp(solarOpacity,1,0.05);
  } else if(viewMode==='transition'){
    const t=clamp((d-280)/(1800-280),0,1);
    galaxyOpacity=lerp(galaxyOpacity,t*t,0.04);
    solarOpacity=lerp(solarOpacity,1-t*0.7,0.04);
  } else {
    galaxyOpacity=lerp(galaxyOpacity,1,0.03);
    solarOpacity=lerp(solarOpacity,0.05,0.04);
  }

  // Apply to galaxy layers
  galaxyGroup.children.forEach(ch=>{
    if(!ch.material)return;
    let targetOp=0;
    if(ch.name==='galaxy-bulge') targetOp=galaxyOpacity*0.85;
    if(ch.name==='galaxy-disk')  targetOp=galaxyOpacity*0.70;
    if(ch.name==='galaxy-dust')  targetOp=galaxyOpacity*0.30;
    if(ch.name==='galaxy-neb')   targetOp=galaxyOpacity*0.55;
    ch.material.opacity=targetOp;
  });

  // Sun marker
  const sm=scene.getObjectByName('sun-marker');
  const sr=scene.getObjectByName('sun-ring');
  if(sm) sm.material.opacity=clamp((galaxyOpacity-0.3)*2,0,0.9);
  if(sr) sr.material.opacity=clamp((galaxyOpacity-0.4)*1.5,0,0.5);

  // Solar system objects fade
  planetMeshes.forEach(p=>{p.group.visible=(solarOpacity>0.02);});
  sunGroup.children.forEach(c=>{if(c.material)c.material.opacity=clamp(c.material.opacity*solarOpacity/Math.max(solarOpacity,0.001),0,1);});

  // Scale indicator
  if(d<280) scaleLabelEl.textContent='1 AU = '+Math.round(d/36)+' units';
  else if(d<1800) scaleLabelEl.textContent='~'+Math.round(d*0.05)+' ly';
  else scaleLabelEl.textContent='~'+Math.round(d*0.05/1000)+'k ly';

  // View mode label
  if(viewMode!==lastViewMode){
    lastViewMode=viewMode;
    viewModeEl.classList.remove('show');
    void viewModeEl.offsetWidth;
    if(viewMode==='galaxy') viewModeEl.textContent='銀河系視角';
    else if(viewMode==='transition') viewModeEl.textContent='脫離太陽系…';
    else viewModeEl.textContent='太陽系視角';
    viewModeEl.classList.add('show');
    setTimeout(()=>viewModeEl.classList.remove('show'),3000);
  }

  // Fog: reduce in galaxy view so stars visible
  if(viewMode==='galaxy') scene.fog.density=lerp(scene.fog.density,0.00008,0.03);
  else scene.fog.density=lerp(scene.fog.density,0.0012,0.03);
}

/* ════════════════════════════════════════════
   HOVER / RAYCASTER
════════════════════════════════════════════ */
const raycaster=new THREE.Raycaster(), mouseNDC=new THREE.Vector2();
const planetLabel=document.getElementById('planet-label');
const infoName=document.getElementById('info-name'), infoDetail=document.getElementById('info-detail');
let hoveredPlanet=null;
document.addEventListener('mousemove',e=>{mouseNDC.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);});

function formatMarketCap(cap){
  return '$' + (cap/1e12).toFixed(2) + 'T';
}

function checkHover(){
  if(viewMode==='galaxy')return;
  raycaster.setFromCamera(mouseNDC,camera);
  const hits=raycaster.intersectObjects(planetMeshes.map(p=>p.pMesh));
  if(hits.length>0){
    const pd=planetMeshes.find(p=>p.pMesh===hits[0].object);
    if(pd){
      hoveredPlanet=pd;
      planetLabel.textContent=pd.data.name; planetLabel.style.opacity='1';
      const pos3=new THREE.Vector3(); pd.group.getWorldPosition(pos3); pos3.project(camera);
      planetLabel.style.left=((pos3.x*0.5+0.5)*innerWidth+14)+'px';
      planetLabel.style.top=((-pos3.y*0.5+0.5)*innerHeight-20)+'px';
      infoName.textContent=pd.data.name;
      infoDetail.textContent=pd.data.marketCap ? formatMarketCap(pd.data.marketCap) : '';
      document.body.style.cursor='pointer';
    }
  } else {
    hoveredPlanet=null; planetLabel.style.opacity='0';
    infoName.textContent=viewMode==='galaxy'?'銀河系 Milky Way':'全球市值前15';
    infoDetail.textContent=viewMode==='galaxy'?' ':' ';
    document.body.style.cursor='default';
  }
}

/* ════════════════════════════════════════════
   RESIZE
════════════════════════════════════════════ */
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

/* ════════════════════════════════════════════
   ANIMATE LOOP
════════════════════════════════════════════ */
const clock=new THREE.Clock();
let elapsed=0;

// Precompute mean motion n for each planet (n ∝ speed)
// Mean anomaly M(t) = M0 + n*t
const BASE_N = 0.18; // base mean motion scale

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  elapsed+=dt;
  const spd=globalSpeed*2.5;

  /* ── Sun pulse ── */
  const sunPulse=1+Math.sin(elapsed*1.2)*0.025;
  sunGroup.scale.setScalar(sunPulse);
  sunLight.intensity=3.5+Math.sin(elapsed*0.85)*0.4;

  /* ── Planets: Kepler elliptical orbits ── */
  const ALIGN_SPACING = 22;
  const ALIGN_TOTAL = (planetMeshes.length - 1) * ALIGN_SPACING;
  planetMeshes.forEach((p, i) => {
    const n = p.data.speed * BASE_N * spd;
    p.M = (p.M + dt * n) % TAU;

    // 軌道位置
    const pos = orbitalPos(p.data, p.M);
    const orbitTarget = new THREE.Vector3(pos.x, pos.y, pos.z);

    // 對齊位置（從太陽向右延伸，rank1最近太陽）
    const alignTarget = new THREE.Vector3((i + 1) * ALIGN_SPACING, 0, 0);

    // 平滑切換
    const target = alignMode ? alignTarget : orbitTarget;
    p.group.position.lerp(target, 0.06);

    // Kepler speed for visual rotation (faster near perihelion)
    const kf = keplerSpeedFactor(p.data, p.M);
    p.pMesh.rotation.y += dt * 0.35 * spd * kf * 0.3;

    // Label position (project 3D → screen)
    const v = p.group.position.clone().project(camera);
    if (v.z < 1) {
      p.label.style.left = ((v.x*0.5+0.5)*innerWidth) + 'px';
      p.label.style.top = ((-v.y*0.5+0.5)*innerHeight + p.data.size*6) + 'px';
      p.label.style.display = 'block';
      p.label.textContent = alignMode
        ? `${p.data.symbol}  ${formatMarketCap(p.data.marketCap)}`
        : p.data.name;
    } else {
      p.label.style.display = 'none';
    }

    // Moon
    const moon=p.group.getObjectByName('moon');
    if(moon){
      const mA=elapsed*spd*1.8;
      moon.position.set(Math.cos(mA)*(p.data.size*2.8),Math.sin(mA*0.3)*0.2,Math.sin(mA)*(p.data.size*2.8));
    }
  });

  /* ── Hovered glow ── */
  if(hoveredPlanet) hoveredPlanet.hazeMesh.material.opacity=0.12+Math.sin(elapsed*3.0)*0.04;

  /* ── Camera drift ── */
  if(!isDragging){orbitThetaV*=0.96;orbitPhiV*=0.96;orbitTheta+=orbitThetaV+dt*0.014;orbitPhi+=orbitPhiV;}
  cameraPos.set(orbitDist*Math.sin(orbitTheta)*Math.cos(orbitPhi),orbitDist*Math.sin(orbitPhi),orbitDist*Math.cos(orbitTheta)*Math.cos(orbitPhi));
  camera.position.lerp(cameraPos,0.055);
  camera.lookAt(lookPt);

  /* ── View mode & galaxy opacity ── */
  updateViewMode();

  /* ── Galaxy slow rotation ── */
  galaxyGroup.rotation.y += dt * 0.0004;

  /* ── Events ── */
  updateShootingStars(dt);
  updateMeteors(dt);
  tickEvents(elapsed,dt);
  checkHover();

  renderer.render(scene,camera);
}

animate();
</script>
